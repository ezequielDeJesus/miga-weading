            <!-- Item 1 -->

                        <button
                            class="size-8 bg-black/20 backdrop-blur-md rounded-full flex items-center justify-center text-white"><span
                                class="material-symbols-outlined text-sm">favorite</span></button>
                        <button
                            class="size-8 bg-black/20 backdrop-blur-md rounded-full flex items-center justify-center text-white"><span
                                class="material-symbols-outlined text-sm">share</span></button>
                    </div>
                </div>
                <h3 class="font-handwritten text-2xl text-[#5f5f5f]">The Ethereal Bride</h3>
                <p class="text-xs text-[#5f5f5f]/80 leading-relaxed max-w-[90%]">Silk organza with hand-sewn pearls. A

                <p class="text-[8px] font-handwritten font-black uppercase text-[#5f5f5f]/40 mt-4 tracking-widest">

            <!-- Item 2 -->

                <p class="text-xs text-[#5f5f5f]/80 leading-relaxed max-w-[90%]">Tuscan-inspired tablescapes featuring
