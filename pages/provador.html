<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miga - O Vestido Da Sua Vida</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles/main.css">
</head>

<body class="dot-grid overflow-x-hidden">
    <div id="app-shell" class="max-w-md mx-auto min-h-screen flex flex-col shadow-2xl bg-[#fdfbf7]">
        <div id="header-placeholder" data-title="O Vestido Da Sua Vida"></div>

        <main id="main-content" class="flex-1 p-4 pb-32">
            <div class="text-center mb-8 relative">
                <p class="font-handwritten text-xl italic text-text-main/60">Encontre o vestido dos seus sonhos...</p>
                <p class="text-[8px] font-black uppercase tracking-[0.3em] opacity-40 mt-1">Powered by Nano Banana AI
                </p>
            </div>

            <!-- Upload Section -->
            <section class="grid grid-cols-2 gap-4 mb-8">
                <!-- Bride Photo -->
                <div class="space-y-3">
                    <label class="font-black text-[9px] uppercase tracking-widest opacity-60 ml-1">Sua Foto</label>
                    <div id="bride-upload-container"
                        class="aspect-[3/4] rounded-2xl border-2 border-dashed border-primary/20 bg-[#eeada7] flex flex-col items-center justify-center cursor-pointer hover:bg-[#eeada7]/90 transition-colors group overflow-hidden relative">
                        <span
                            class="material-symbols-outlined text-white/50 group-hover:scale-110 transition-transform">add_a_photo</span>
                        <span class="text-[8px] font-bold text-white/50 mt-2 uppercase">Selecionar</span>
                        <img id="bride-preview" class="hidden absolute inset-0 w-full h-full object-cover">
                        <input type="file" id="bride-input" accept="image/*" class="hidden">
                    </div>
                </div>

                <!-- Dress Photo -->
                <div class="space-y-3">
                    <label class="font-black text-[9px] uppercase tracking-widest opacity-60 ml-1">O Vestido</label>
                    <div id="dress-upload-container"
                        class="aspect-[3/4] rounded-2xl border-2 border-dashed border-primary/20 bg-[#eeada7] flex flex-col items-center justify-center cursor-pointer hover:bg-[#eeada7]/90 transition-colors group overflow-hidden relative">
                        <span
                            class="material-symbols-outlined text-white/50 group-hover:scale-110 transition-transform">apparel</span>
                        <span class="text-[8px] font-bold text-white/50 mt-2 uppercase">Selecionar</span>
                        <img id="dress-preview" class="hidden absolute inset-0 w-full h-full object-cover">
                        <input type="file" id="dress-input" accept="image/*" class="hidden">
                    </div>
                </div>
            </section>

            <!-- Action Button -->
            <div id="generate-trigger" class="px-2 mb-12">
                <button id="btn-match"
                    class="w-full bg-[#225373] text-white py-4 rounded-xl shadow-xl flex items-center justify-center gap-3 font-black text-xs uppercase tracking-widest active:scale-95 transition-all opacity-50 cursor-not-allowed pointer-events-none">
                    <span class="material-symbols-outlined text-sm">auto_awesome</span>
                    <span>Ver em Mim</span>
                </button>
            </div>

            <!-- Result Section (History) -->
            <section id="results-history" class="space-y-8 px-2">
                <div class="flex justify-between items-center bg-gray-50/50 p-2 rounded-lg border border-black/5">
                    <h3 class="font-black text-[10px] tracking-[0.2em] uppercase opacity-60">Suas Sugestões</h3>
                    <span class="material-symbols-outlined opacity-30 text-sm">history</span>
                </div>

                <div id="provador-list" class="grid grid-cols-1 gap-10">
                    <!-- Dynamically populated -->
                </div>
            </section>

            <!-- AI Loading Overlay (Standard Hidden) -->
            <div id="ai-overlay"
                class="fixed inset-0 bg-primary/95 backdrop-blur-sm z-[60] hidden flex flex-col items-center justify-center text-white p-10 text-center">
                <div class="relative size-24 mb-6">
                    <div class="absolute inset-0 border-4 border-white/20 rounded-full"></div>
                    <div class="absolute inset-0 border-4 border-t-white rounded-full animate-spin"></div>
                    <span
                        class="material-symbols-outlined absolute inset-0 flex items-center justify-center text-3xl animate-pulse">sparkles</span>
                </div>
                <h3 class="font-handwritten text-4xl mb-2">Refinando a Magia...</h3>
                <p class="font-sketch text-lg opacity-60">A Nano Banana AI está ajustando o caimento e as luzes para
                    você.</p>
            </div>
        </main>

        <div id="nav-placeholder"></div>
    </div>

    <script type="module">
        import { renderHeader } from '/src/components/AppHeader.js';
        import { renderBottomNav } from '/src/components/BottomNav.js';
        import { NanoBananaAI } from '/src/utils/nanoBanana.js';
        import { shareImage } from '/src/utils/share.js';

        document.getElementById('header-placeholder').innerHTML = renderHeader('O Vestido Da Sua Vida');
        document.getElementById('nav-placeholder').innerHTML = renderBottomNav();

        const brideContainer = document.getElementById('bride-upload-container');
        const dressContainer = document.getElementById('dress-upload-container');
        const brideInput = document.getElementById('bride-input');
        const dressInput = document.getElementById('dress-input');
        const bridePreview = document.getElementById('bride-preview');
        const dressPreview = document.getElementById('dress-preview');
        const btnMatch = document.getElementById('btn-match');
        const aiOverlay = document.getElementById('ai-overlay');
        const provadorList = document.getElementById('provador-list');

        let uploads = { bride: null, dress: null };

        const setupUpload = (container, input, type) => {
            container.onclick = () => input.click();
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = event.target.result;
                        uploads[type] = img;
                        const preview = document.getElementById(`${type}-preview`);
                        preview.src = img;
                        preview.classList.remove('hidden');
                        checkReady();
                    };
                    reader.readAsDataURL(file);
                }
            };
        };

        setupUpload(brideContainer, brideInput, 'bride');
        setupUpload(dressContainer, dressInput, 'dress');

        const checkReady = () => {
            if (uploads.bride && uploads.dress) {
                btnMatch.classList.remove('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
            }
        };


        btnMatch.onclick = async () => {
            aiOverlay.classList.remove('hidden');
            const messages = [
                "Escaneando proporções...",
                "Alinhando tecidos de seda...",
                "Removendo sombras indesejadas...",
                "Ajustando caimento real...",
                "Renderizando luzes de estúdio...",
                "Finalizando toque editorial..."
            ];

            let msgIdx = 0;
            const msgEl = aiOverlay.querySelector('p');
            const interval = setInterval(() => {
                msgEl.innerText = messages[msgIdx % messages.length];
                msgIdx++;
            }, 700);

            // Generate the composite image using Nano Banana AI
            const resultImg = await NanoBananaAI.simulateTryOn(uploads.bride, uploads.dress);

            setTimeout(() => {
                clearInterval(interval);
                aiOverlay.classList.add('hidden');
                saveResult(resultImg);
                // Reset
                uploads = { bride: null, dress: null };
                bridePreview.classList.add('hidden');
                dressPreview.classList.add('hidden');
                btnMatch.classList.add('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
            }, 4000);
        };

        const saveResult = (compositeImg) => {
            try {
                let results = JSON.parse(localStorage.getItem('miga_provador') || '[]');
                const newResult = {
                    id: Date.now(),
                    img: compositeImg,
                    date: new Date().toLocaleDateString('pt-BR')
                };

                // Add to start
                results.unshift(newResult);

                // Keep trying to save, if quota exceeded, remove oldest
                let saved = false;
                while (!saved && results.length > 0) {
                    try {
                        localStorage.setItem('miga_provador', JSON.stringify(results));
                        saved = true;
                    } catch (e) {
                        if (e.name === 'QuotaExceededError') {
                            console.warn('LocalStorage cheio! Removendo o item mais antigo...');
                            results.pop(); // Remove the oldest item and try again
                        } else {
                            throw e;
                        }
                    }
                }

                if (saved) {
                    renderResults();
                } else {
                    console.error('Imagem muito grande para ser salva no LocalStorage sozinha.');
                    // Still render the current result even if it couldn't be saved to history
                    provadorList.innerHTML = `
                        <div class="polaroid-rose relative animate-in fade-in slide-in-from-bottom-4 duration-700">
                           <div class="aspect-[3/4] bg-white rounded-sm overflow-hidden mb-4 relative shadow-inner">
                              <img src="${compositeImg}" class="w-full h-full object-cover">
                           </div>
                           <div class="font-handwriting text-2xl text-rose-900/80 mb-1">Não foi possível salvar (Memória cheia)</div>
                        </div>
                    ` + provadorList.innerHTML;
                }
            } catch (error) {
                console.error('Erro ao salvar no histórico:', error);
            }
        };

        const renderResults = () => {
            const results = JSON.parse(localStorage.getItem('miga_provador') || '[]');
            provadorList.innerHTML = results.map(res => `
                <div class="polaroid-rose relative animate-in fade-in slide-in-from-bottom-4 duration-700">
                    <div class="absolute -top-3 -right-3 flex gap-2 z-30">
                        <button class="size-8 bg-white text-[#225373] rounded-full shadow-lg flex items-center justify-center border-b-2 border-[#225373]/10 active:scale-95 transition-transform" onclick="shareResult('${res.id}')">
                            <span class="material-symbols-outlined text-sm">share</span>
                        </button>
                        <button class="size-8 bg-white text-red-500 rounded-full shadow-lg flex items-center justify-center border-b-2 border-red-100 active:scale-95 transition-transform" onclick="deleteResult(${res.id})">
                            <span class="material-symbols-outlined text-sm">close</span>
                        </button>
                    </div>
                    <div class="aspect-[3/4] bg-white rounded-sm overflow-hidden mb-4 relative shadow-inner">
                        <img src="${res.img}" id="img-${res.id}" class="w-full h-full object-cover transition-transform hover:scale-105 duration-[2s]">
                        <div class="absolute bottom-4 left-4 right-4 bg-white/80 backdrop-blur-md p-3 rounded-lg border border-white/40">
                            <p class="font-handwritten text-xl text-[#5f5f5f]">Eu disse sim!</p>
                            <p class="text-[7px] font-black uppercase opacity-40 tracking-widest mt-1">${res.date}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        };

        window.deleteResult = (id) => {
            const results = JSON.parse(localStorage.getItem('miga_provador') || '[]');
            localStorage.setItem('miga_provador', JSON.stringify(results.filter(r => r.id !== id)));
            renderResults();
        };

        window.shareResult = async (id) => {
            const results = JSON.parse(localStorage.getItem('miga_provador') || '[]');
            const res = results.find(r => r.id == id);
            if (res) {
                await shareImage(res.img, 'Miga - Meu Vestido Ideal', 'Olha só como ficou o meu vestido dos sonhos na Miga!', `vestido-miga-${id}.png`);
            }
        };

        renderResults();
    </script>
</body>

</html>
